<!DOCTYPE html>
<html>
<head>
<title>Protect Punch</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- GAME FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

body {
background: #000;
text-align: center;
font-family: Arial;
overflow: hidden;
height: 100vh;
width: 100vw;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

h1 {
display: none;
}

#gameWrapper {
display: flex;
justify-content: center;
align-items: center;
width: 100vw;
height: 100vh;
}

canvas {
background: #cfe8a9;
border: 4px solid black;
max-width: 100vw;
max-height: 100vh;
width: auto;
height: auto;
touch-action: none;
display: block;
}

#muteBtn {
position: fixed;
top: 10px;
right: 10px;
font-size: 16px;
padding: 6px 12px;
z-index: 10;
}

#restartBtn, #shareBtn {
position: fixed;
bottom: 30px;
font-size: clamp(14px, 3vw, 18px);
padding: 10px 20px;
cursor: pointer;
z-index: 10;
}

#restartBtn {
left: 50%;
transform: translateX(-120%);
}

#shareBtn {
left: 50%;
transform: translateX(20%);
}

@media (orientation: portrait) and (max-width: 768px) {
body::before {
content: "Please rotate your device to play 🔄";
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
width: 100vw;
font-size: 24px;
font-family: Arial;
color: white;
background: #000;
position: fixed;
top: 0;
left: 0;
z-index: 999;
text-align: center;
padding: 20px;
}
}

</style>
</head>
<body>

<!-- SOUND TOGGLE -->
<button id="muteBtn">🔊 Sound</button>

<!-- GAME CANVAS -->
<div id="gameWrapper">
<canvas id="gameCanvas" width="600" height="600"></canvas>
</div>

<!-- GAME BUTTONS -->
<button id="restartBtn" style="display:none;">Play Again</button>
<button id="shareBtn" style="display:none;">Share Score</button>

<script src="game.js"></script>
<script data-goatcounter="https://protectpunch.goatcounter.com/count"
      async src="//gc.zgo.at/count.js"></script>

</body>
</html>
